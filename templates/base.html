<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.O.R.E. CAMP - Aviation Digital Twin</title>
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom Premium CSS Design System -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="app-layout">
    
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <i class="bi bi-cpu"></i>
            </div>
            <div class="sidebar-title">
                <div style="font-weight: 700; font-size: 1.125rem;">C.O.R.E. CAMP</div>
                <div style="font-size: 0.75rem; color: var(--accent-cyan);">Aviation Digital Twin</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="/" class="nav-item">
                <i class="bi bi-grid-1x2-fill"></i>
                <span class="nav-label">Fleet Dashboard</span>
            </a>
            <a href="/workspace" class="nav-item">
                <i class="bi bi-tools"></i>
                <span class="nav-label">CAMO Workspace</span>
            </a>
            <a href="/flight_log" class="nav-item">
                <i class="bi bi-journal-text"></i>
                <span class="nav-label">Pilot Discrepancies</span>
            </a>
            <a href="/due_list" class="nav-item">
                <i class="bi bi-calendar-check"></i>
                <span class="nav-label">Smart Due List</span>
            </a>
            <a href="/history" class="nav-item">
                <i class="bi bi-archive-fill"></i>
                <span class="nav-label">Maintenance Log</span>
            </a>
            <a href="/calendar" class="nav-item">
                <i class="bi bi-calendar-week"></i>
                <span class="nav-label">Hangar Schedule</span>
            </a>
            <a href="/mel" class="nav-item">
                <i class="bi bi-clipboard2-pulse"></i>
                <span class="nav-label">MEL Tracker</span>
            </a>
            <a href="/tool_crib" class="nav-item">
                <i class="bi bi-wrench-adjustable"></i>
                <span class="nav-label">Digital Tool Crib</span>
            </a>
            <a href="/telemetry" class="nav-item">
                <i class="bi bi-activity"></i>
                <span class="nav-label">Sensor Telemetry</span>
            </a>
            
            <div style="height: 1px; background: var(--border-subtle); margin: 8px 0;"></div>
            
            <a href="/personnel" class="nav-item">
                <i class="bi bi-person-vcard"></i>
                <span class="nav-label">Authorized Personnel</span>
            </a>
            <a href="/xai_reasoner" class="nav-item" style="color: var(--accent-cyan);">
                <i class="bi bi-robot"></i>
                <span class="nav-label">AI Reasoner Logs</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content Wrapper -->
    <div class="main-wrapper">
        
        <!-- Glassmorphic Top Nav -->
        <header class="top-nav">
            <button class="nav-toggle" id="sidebarToggle" title="Toggle Sidebar">
                <i class="bi bi-arrow-bar-left"></i>
            </button>
            
            <div class="system-status">
                <div class="pulse-dot"></div>
                System Online
            </div>
        </header>

        <!-- Dynamic Page Content -->
        <main class="app-canvas">
            {% block content %}{% endblock %}
        </main>
    </div>

</div>

<!-- Vanilla JS for Interactions -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const toggleBtn = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        
        toggleBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('mobile-open');
                sidebar.classList.remove('collapsed');
            } else {
                sidebar.classList.toggle('collapsed');
            }
            
            // Dynamic arrow flip based on sidebar state
            const icon = toggleBtn.querySelector('i');
            if (sidebar.classList.contains('collapsed')) {
                icon.className = 'bi bi-arrow-bar-right';
            } else {
                icon.className = 'bi bi-arrow-bar-left';
            }
        });
        
        // Close sidebar on mobile when clicking outside
        document.addEventListener('click', function(e) {
            if (window.innerWidth <= 768 && sidebar.classList.contains('mobile-open')) {
                if (!sidebar.contains(e.target) && e.target !== toggleBtn) {
                    sidebar.classList.remove('mobile-open');
                }
            }
        });
        
        // Highlight active nav item based on URL
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('.nav-item');
        navLinks.forEach(link => {
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active');
            }
        });

        // Simple custom details toggle handler for browsers that don't auto-handle it, or specific styles
        const detailsElements = document.querySelectorAll('details');
        detailsElements.forEach(detail => {
            detail.addEventListener('toggle', (e) => {
                if(detail.open) {
                    // Close others if we want an accordion effect (optional)
                }
            });
        });
    });
</script>

</body>
</html>
